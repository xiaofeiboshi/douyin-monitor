name: Douyin Daily Monitor

on:
  schedule:
    # Run at 00:00 UTC = 08:00 CST every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # needed to commit sent_history.json
      issues: write        # needed to create notification issues
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Douyin Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/run.py

      - name: Commit sent history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/sent_history.json data/last_result.json
          git diff --staged --quiet || git commit -m "update: monitor history $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git push
